<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Summarizer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">
        🤖 AI Document Summarizer
    </h1>

    <div class="card shadow">

        <div class="card-body">

            <div class="mb-3">
                <label for="documentInput" class="form-label">Choose document to summarize</label>
                <input
                    id="documentInput"
                    class="form-control"
                    type="file"
                    title="Choose a document file to upload"
                    aria-label="Document file input">
            </div>

            <button
                class="btn btn-primary w-100">
                Summarize
            </button>

        </div>

    </div>

</div>

</body>
</html>
