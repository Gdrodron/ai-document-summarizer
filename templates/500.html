{% extends "base.html" %}

{% block title %}
Server Error
{% endblock %}

{% block content %}

<div class="error-page text-center">

    <i class="bi bi-exclamation-triangle error-icon"></i>

    <div class="hero-eyebrow justify-content-center">Error 500</div>

    <h1 class="display-4 mb-3">
        Something broke on our end
    </h1>

    <p class="lead mx-auto">
        Not you — us. The server ran into a problem handling your
        request. Try again in a moment.
    </p>

    <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg mt-3">
        <i class="bi bi-house-door"></i>
        Back to home
    </a>

</div>

{% endblock %}
