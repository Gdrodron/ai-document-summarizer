{% extends "base.html" %}

{% block title %}
Page Not Found
{% endblock %}

{% block content %}

<div class="error-page text-center">

    <i class="bi bi-signpost-split error-icon"></i>

    <div class="hero-eyebrow justify-content-center">Error 404</div>

    <h1 class="display-4 mb-3">
        This page doesn't exist
    </h1>

    <p class="lead mx-auto">
        The page you're looking for may have moved or was never here
        to begin with.
    </p>

    <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg mt-3">
        <i class="bi bi-house-door"></i>
        Back to home
    </a>

</div>

{% endblock %}
